name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
  repository_dispatch:
    types: [trigger-workflow]

permissions: write-all
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  HASH_FILE: build_hash

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    if: ${{ github.event.head_commit.message != 'Update hash file' }}
    outputs:
      hash_content: ${{ steps.read_hash.outputs.hash_content }}
    steps:
      - uses: actions/checkout@v4
      - id: read_hash
        run: |
          content=$(cat ${{ env.HASH_FILE }}) || true
          echo "hash_content=$content" >> "$GITHUB_OUTPUT"

  check:
    name: Check Should Rebuild
    runs-on: ubuntu-latest
    needs: prepare
    outputs:
      canceled: ${{ steps.use_content.outputs.canceled }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: innei-dev/shiroi
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0
          lfs: true
      - id: use_content
        env:
          FILE_HASH: ${{ needs.prepare.outputs.hash_content }}
        run: |
          file_hash=$FILE_HASH
          current_hash=$(git rev-parse --short HEAD)
          if [ "$file_hash" == "$current_hash" ]; then
            echo "canceled=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build artifact
    runs-on: ubuntu-latest
    needs: check
    if: ${{needs.check.outputs.canceled != 'true'}}
    strategy:
      matrix:
        node-version: [20]
    outputs:
      sha_short: ${{ steps.store.outputs.sha_short }}
      branch: ${{ steps.store.outputs.branch }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: innei-dev/shiroi
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0
          lfs: true

      - name: Checkout LFS objects
        run: git lfs checkout
        
      - uses: pnpm/action-setup@v4
        with:
          version: 10.27.0
          
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
          
      - uses: jongwooo/next-cache@v1
      
      - name: Install dependencies
        run: pnpm install
        
      - name: Build project (Bypass broken scripts)
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_GATEWAY_URL: ${{ secrets.NEXT_PUBLIC_GATEWAY_URL }}
        run: |
          echo "🚀 蝶儿强行接管：直接呼叫 Turbo 进行全量构建..."
          pnpm build
          
          echo "📦 智能寻路系统：定位 Next.js Standalone 产物..."
          STANDALONE_DIR=$(find . -path "*/.next/standalone" -type d | head -n 1)
          if [ -z "$STANDALONE_DIR" ]; then 
            echo "❌ 致命错误：找不到 standalone 目录！"
            exit 1
          fi
          
          NEXT_DIR=$(dirname "$STANDALONE_DIR")
          APP_DIR=$(dirname "$NEXT_DIR")
          
          mv "$STANDALONE_DIR" ./deploy_standalone
          mkdir -p "./deploy_standalone/$APP_DIR"
          
          echo "✨ 拷贝公共资源与静态文件..."
          cp -rL "$APP_DIR/public" "./deploy_standalone/$APP_DIR/public" 2>/dev/null || true
          mkdir -p "./deploy_standalone/$APP_DIR/.next"
          cp -rL "$NEXT_DIR/static" "./deploy_standalone/$APP_DIR/.next/static" 2>/dev/null || true
          
          echo "✨ 蝶儿补救魔法：动用 Node 引擎穿透 pnpm v10 虚拟层，精准捕获 Shiki 及其依赖！..."
          # 利用单引号保护 Node 脚本，精准解析并提取底层依赖！
          APP_DIR="$APP_DIR" node -e '
            const path = require("path");
            const { execSync } = require("child_process");
            const appDir = path.resolve(process.env.APP_DIR);
            
            function copyPkg(pkgName, resolveFrom) {
              try {
                // 利用 require.resolve 穿透 pnpm 的软链迷宫找到真实的 package.json
                const pkgJson = require.resolve(pkgName + "/package.json", { paths: [resolveFrom] });
                const src = path.dirname(pkgJson);
                const dest = path.resolve("./deploy_standalone/node_modules", pkgName);
                
                execSync("mkdir -p \"" + path.dirname(dest) + "\"");
                execSync("rm -rf \"" + dest + "\""); // 防冲突
                execSync("cp -rL \"" + src + "\" \"" + dest + "\""); // 强行解除软链拷贝
                console.log("✅ 精准捕获: " + pkgName);
                return src;
              } catch (e) {
                console.log("⚠️ 未找到 (可能被优化了): " + pkgName);
                return resolveFrom;
              }
            }
            
            // 顺藤摸瓜：从 app 找 shiki，再从 shiki 找它的底层引擎！
            const shikiPath = copyPkg("shiki", appDir);
            copyPkg("@shikijs/engine-oniguruma", shikiPath);
            copyPkg("@shikijs/core", shikiPath);
            copyPkg("@shikijs/transformers", shikiPath);
          '
          
          echo "📦 开始打包 release.zip..."
          mkdir -p assets
          cd deploy_standalone
          zip -q -r ../assets/release.zip ./*
          cd ..
          echo "✅ 构建彻底完成！"

      # ✨ 之前就是漏了这段！导致存不下来包！
      - name: Cache Build Artifacts
        id: cache-primes
        uses: actions/cache/save@v4
        with:
          path: assets
          key: ${{ github.run_number }}-release

      - id: store
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "branch=$(git rev-parse --abbrev-ref HEAD)" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy artifact
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/cache/restore@v4
        with:
          path: assets
          key: ${{ github.run_number }}-release
          
      - run: mv assets/release.zip release.zip

      - uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          password: ${{ secrets.PASSWORD }}
          key: ${{ secrets.KEY }}
          port: ${{ secrets.PORT }}
          source: 'release.zip'
          target: '/tmp/shiro'

      - uses: appleboy/ssh-action@master
        with:
          command_timeout: 5m
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          password: ${{ secrets.PASSWORD }}
          key: ${{ secrets.KEY }}
          port: ${{ secrets.PORT }}
          script: |
            set -e
            source $HOME/.bashrc
            basedir=$HOME/shiro
            workdir=$basedir/${{ github.run_number }}
            mkdir -p "$workdir" "$basedir/.cache"
            
            mv /tmp/shiro/release.zip "$workdir/release.zip"
            cd "$workdir"
            unzip -qq -o release.zip
            rm -rf /tmp/shiro
            
            echo "🔧 动态生成 PM2 配置文件..."
            echo 'module.exports = { apps: [{ name: "Shiroi", script: "./server.js", cwd: __dirname, exec_mode: "fork", instances: 1, autorestart: true, watch: false, max_memory_restart: "500M", env: { NODE_ENV: "production", HOSTNAME: "0.0.0.0", PORT: process.env.PORT || 2323, NEXT_SHARP_PATH: process.env.NEXT_SHARP_PATH }, merge_logs: true }] }' > "$basedir/ecosystem.config.js"
            
            echo "🔍 正在进行物理路径对准..."
            SERVER_JS_PATH=$(find . -name "server.js" -not -path "*/node_modules/*" | head -n 1)
            APP_DIR=$(dirname "$SERVER_JS_PATH")
            
            rm -rf "$APP_DIR/.env"
            ln -s "$HOME/shiro/.env" "$APP_DIR/.env"
            
            export NEXT_SHARP_PATH=$(npm root -g)/sharp
            
            ln -sf "$workdir/$SERVER_JS_PATH" "$basedir/server.js"
            
            mkdir -p "$APP_DIR/.next"
            rm -rf "$APP_DIR/.next/cache"
            ln -sf "$basedir/.cache" "$APP_DIR/.next/cache"
            
            cd "$basedir"
            echo "🚀 全力启动服务器..."
            if pm2 describe Shiroi >/dev/null 2>&1; then
              pm2 reload ecosystem.config.js --update-env
            else
              pm2 start ecosystem.config.js --update-env
            fi
            
            rm "$workdir/release.zip"
            pm2 save
            echo "✅ 一切就绪！部署通关！"

  store:
    name: Store artifact commit version
    runs-on: ubuntu-latest
    needs: [deploy, build]
    steps:
      - uses: actions/checkout@v4
      - run: echo ${{ needs.build.outputs.sha_short }} > ${{ env.HASH_FILE }}
      - run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add ${{ env.HASH_FILE }}
          git commit -a -m "Update hash file"
      - uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}

name: Build and Deploy (Dockerized)

on:
  push:
    branches:
      - main
  workflow_dispatch:
  repository_dispatch:
    types: [trigger-workflow]

permissions: write-all
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy via Docker
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout Code
        uses: actions/checkout@v4
        with:
          repository: innei-dev/shiroi
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0
          lfs: true

      - name: ⬇️ Checkout LFS objects
        run: git lfs checkout

      - name: ⚙️ Prepare Environment Variables
        run: |
          echo "BASE_URL=${{ secrets.BASE_URL }}" >> .env.production
          echo "NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}" >> .env.production
          echo "NEXT_PUBLIC_GATEWAY_URL=${{ secrets.NEXT_PUBLIC_GATEWAY_URL }}" >> .env.production

      - name: 🐳 Build Docker Image
        run: |
          echo "🚀 蝶儿启动 Docker 兵工厂，开始铸造终极镜像..."
          docker build -t shiroi:latest .
          
      - name: 📦 Compress Docker Image
        run: |
          echo "📦 正在将镜像打包压缩，准备空投..."
          docker save shiroi:latest | gzip > shiroi.tar.gz

      - name: 🚀 Upload Image to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          password: ${{ secrets.PASSWORD }}
          key: ${{ secrets.KEY }}
          port: ${{ secrets.PORT }}
          source: 'shiroi.tar.gz'
          target: '/tmp'

      - name: 🎯 Load & Run on Server
        uses: appleboy/ssh-action@master
        with:
          command_timeout: 15m
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          password: ${{ secrets.PASSWORD }}
          key: ${{ secrets.KEY }}
          port: ${{ secrets.PORT }}
          script: |
            set -e
            
            echo "🔍 检查并安装 Docker 环境..."
            if ! command -v docker &> /dev/null; then
                echo "⚠️ 未找到 Docker，正在为你全自动安装..."
                curl -fsSL https://get.docker.com | bash
                systemctl enable docker || true
                systemctl start docker || true
            fi
            
            echo "🐳 正在解压并加载最新镜像 (这可能需要一点时间)..."
            docker load -i /tmp/shiroi.tar.gz
            rm /tmp/shiroi.tar.gz
            
            echo "🛑 正在清理旧时代的 PM2 进程与旧容器..."
            if command -v pm2 &> /dev/null; then
              pm2 delete Shiroi 2>/dev/null || true
              pm2 save 2>/dev/null || true
            fi
            docker stop shiroi_app 2>/dev/null || true
            docker rm shiroi_app 2>/dev/null || true
            
            echo "🚀 引擎点火！启动全新容器..."
            # 使用 network host 模式，完美兼容你原本的端口设置！
            docker run -d \
              --name shiroi_app \
              --restart always \
              --network host \
              --env-file $HOME/shiro/.env \
              shiroi:latest
              
            echo "🎉 部署大满贯完成！前往 /thinking 页面享受代码高亮吧！"
